version: '3.8'

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: courierdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/courierdb
    depends_on:
      - postgres

volumes:
  postgres_data: